# Passenger configuration adapted for a Django WSGI application
# Copy this file into your Apache/LiteSpeed vhost configuration or include it from
# a site-enabled file. Update the paths and Python virtualenv executable below.

# --- APPLICATION ROOT / ENTRY POINT ------------------------------------------------
# Set the application root to your Django project path (absolute path)
PassengerAppRoot "/home/dbitsdemo/projects/Python/cartify-backend"
PassengerBaseURI "/"

# For Django use WSGI
PassengerAppType wsgi
# Point Passenger to the WSGI entry point. This should be the module path to your
# WSGI application object. For a typical Django project this is '<project>.wsgi:application'
# Update the path below if your wsgi module is different.
# Passenger will load this file in the application root. We provide a small
# `passenger_wsgi.py` helper (created next to this file) that imports your
# Django WSGI application (`config.wsgi.application`).
PassengerStartupFile passenger_wsgi.py

# --- PYTHON / VIRTUALENV -----------------------------------------------------------
# Set PassengerPython to the Python executable inside your virtualenv for this project.
# Example: /home/dbitsdemo/.virtualenvs/cartify-backend/bin/python
# Replace the path below with your project's virtualenv python.
# Use the virtualenv path you provided for cPanel (adjust if different):
PassengerPython "/home/dbitsdemo/virtualenv/projects/Python/cartify-backend/3.9/bin/python"

# --- REQUEST HANDLING -------------------------------------------------------------
<IfModule mod_rewrite.c>
    <IfModule mod_negotiation.c>
        Options -MultiViews -Indexes
    </IfModule>
    RewriteEngine On
    # Handle Authorization Header
    RewriteCond %{HTTP:Authorization} .
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
    # Redirect Trailing Slashes If Not A Folder...
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} (.+)/$
    RewriteRule ^ %1 [L,R=301]
    # Send Requests To Front Controller (Django's wsgi) if not a file or dir
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_FILENAME} !-f
    # Passenger will route requests to the WSGI application (passenger_wsgi.py).
    # Keep a fallback rule if you want to redirect everything to passenger_wsgi.py
    RewriteRule ^ passenger_wsgi.py [L]
</IfModule>

